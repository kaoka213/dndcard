<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Cards</title>
    <link rel="stylesheet" href="css/agent-cards-style.css" />
    <style>
        /* Batch export controls — dark-mode SaaS, mevcut değişkenleri kullanır */
        .batch-row {
            align-items: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .batch-label {
            color: var(--text-muted);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
        }
        .batch-select {
            flex: 0 0 auto;
            min-width: 150px;
        }
        .batch-limit {
            width: 84px;
            background-color: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            padding: 10px 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .batch-limit:focus {
            border-color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="page-wrapper">

        <!-- Header -->
        <header class="page-header">
            <a class="back-link" href="../index.html">← Ana Sayfa</a>
            <h1>Agent System Prompt Cards</h1>
            <p>Claude Code agent system promptlarını görsel kartlar olarak incele ve PNG olarak indir.</p>
        </header>

        <!-- Agent selector -->
        <div class="controls">
            <label for="agentSelect">Agent:</label>
            <select id="agentSelect" class="agent-select">
                <!-- JavaScript ile doldurulur -->
            </select>
        </div>

        <!-- Canvas -->
        <div class="canvas-wrapper">
            <canvas id="agentCanvas" width="612" height="792"></canvas>
        </div>

        <!-- Variation picker (görsel varyasyonlar varsa gösterilir) -->
        <div class="variation-row" id="variationRow" style="display:none;">
            <span class="variation-label">Varyasyon:</span>
            <button class="var-btn active" data-v="0">Ana</button>
            <button class="var-btn" data-v="1">v1</button>
            <button class="var-btn" data-v="2">v2</button>
            <button class="var-btn" data-v="3">v3</button>
            <button id="setMainBtn" class="btn btn-secondary btn-sm">← Bu varyasyonu ana yap</button>
        </div>

        <!-- Actions -->
        <div class="action-row">
            <button id="downloadBtn" class="btn btn-primary">
                ↓ PNG İndir
            </button>
            <a href="browse.html" class="btn btn-secondary" style="text-decoration:none;">
                🔍 Tüm Promptlar
            </a>
        </div>

        <!-- Batch export controls -->
        <div class="action-row batch-row">
            <label for="batchCategory" class="batch-label">Kategori:</label>
            <select id="batchCategory" class="agent-select batch-select">
                <option value="all">Tümü</option>
                <option value="design">Tasarım</option>
                <option value="dev">Geliştirme</option>
                <option value="qa">QA</option>
                <option value="utility">Yardımcı</option>
            </select>
            <label for="batchLimit" class="batch-label">Limit:</label>
            <input type="number" id="batchLimit" class="batch-limit" min="1" placeholder="hepsi" />
            <button id="batchBtn" class="btn btn-secondary">
                ⬇ İndir
            </button>
        </div>

        <!-- Meta -->
        <div class="meta-row">
            <span class="meta-chip" id="agentCountChip">15 agent</span>
            <span class="meta-chip">612 × 792 px</span>
        </div>

    </div>

    <!-- jQuery (from existing dnd/js/ — no copy needed) -->
    <script src="../dnd/js/jquery-3.4.1.min.js"></script>
    <!-- Agent card renderer -->
    <script src="js/agent-cards-script.js"></script>

    <!-- LoR patterns — 5 partial files, all merged into AC before Init() fires -->
    <!-- Pattern 1+2: polygon clip art + double-layer blur portrait -->
    <script src="js/partials/art-blur-polygon.js"></script>
    <!-- Pattern 5: LoR 3-part keyword chip tool badges -->
    <script src="js/partials/keyword-chips.js"></script>
    <!-- Pattern 3: LoR mana gem → tool count (top-left corner) -->
    <script src="js/partials/mana-gem.js"></script>
    <!-- Pattern 4: LoR power/health corners → capability + tool count -->
    <script src="js/partials/bottom-stats.js"></script>
    <!-- Pattern 6+7+8: region icon stack + rarity gem + UPPERCASE name -->
    <script src="js/partials/visual-elements.js"></script>

    <script>
        // Merge all 5 partials into AC synchronously (before $.ready / AC.Init fires)
        Object.assign(AC, PARTIAL_ArtBlurPolygon);   // DrawPortrait, DrawPortraitVignette
        Object.assign(AC, PARTIAL_KeywordChips);      // DrawTools (3-part chip)
        Object.assign(AC, PARTIAL_ManaGem);           // DrawManaGem
        Object.assign(AC, PARTIAL_BottomStats);       // DrawBottomStats + helpers
        Object.assign(AC, PARTIAL_VisualElements);    // DrawRegionStack, DrawRarityGem, DrawNameOverlay
    </script>

    <script>
        // Hangi varyasyonların var olduğunu kontrol et
        function checkVariations(agentId) {
            const row = document.getElementById("variationRow");
            const btns = document.querySelectorAll(".var-btn");
            let found = 0;

            // Paralel img probe: her varyasyon dosyasının var olup olmadığını test et
            const checks = [1, 2, 3].map(v => new Promise(resolve => {
                const img = new Image();
                img.onload  = () => resolve(v);
                img.onerror = () => resolve(null);
                img.src = `images/agents/${agentId}-v${v}.jpg?t=${Date.now()}`;
            }));

            Promise.all(checks).then(results => {
                const existing = results.filter(v => v !== null);
                if (existing.length > 0) {
                    row.style.display = "flex";
                    btns.forEach(b => {
                        const v = parseInt(b.dataset.v);
                        if (v === 0) { b.style.display = ""; b.classList.add("active"); return; }
                        b.style.display = existing.includes(v) ? "" : "none";
                        b.classList.remove("active");
                    });
                } else {
                    row.style.display = "none";
                }
            });
        }

        $(document).ready(function () {
            function applyAccent(color) {
                document.documentElement.style.setProperty('--accent', color);
                const btn = document.getElementById('downloadBtn');
                btn.style.backgroundColor = color;
                btn.style.boxShadow = `0 4px 20px ${color}55`;
            }

            setTimeout(function () {
                if (AC.currentAgent) {
                    applyAccent(AC.currentAgent.accentColor);
                    checkVariations(AC.currentAgent.id);
                }
                $("#agentCountChip").text(AC.agents.length + " agent");

                // URL param: ?agent=some-id → open that agent directly
                const urlParam = new URLSearchParams(window.location.search).get('agent');
                if (urlParam) {
                    const found = AC.agents.find(a => a.id === urlParam);
                    if (found) {
                        AC.Make(found.id);
                        applyAccent(found.accentColor);
                    }
                }
            }, 750);

            $("#agentSelect").on("change", function () {
                setTimeout(function () {
                    if (AC.currentAgent) {
                        applyAccent(AC.currentAgent.accentColor);
                        checkVariations(AC.currentAgent.id);
                    }
                }, 60);
            });

            // Varyasyon butonları
            $(document).on("click", ".var-btn", function () {
                if (!AC.currentAgent) return;
                document.querySelectorAll(".var-btn").forEach(b => b.classList.remove("active"));
                this.classList.add("active");

                const v = parseInt(this.dataset.v);
                const id = AC.currentAgent.id;

                if (v === 0) {
                    // Ana görsel
                    AC.bgImages[id] = undefined; // cache temizle, yeniden yükle
                    delete AC.bgImages[id];
                    AC.Make(id);
                } else {
                    // Varyasyon görsel
                    const img = new Image();
                    img.onload = () => {
                        AC.bgImages[id] = img;
                        AC.Draw(AC.currentAgent, img);
                    };
                    img.src = `images/agents/${id}-v${v}.jpg`;
                }
            });

            // "Bu varyasyonu ana yap" — aktif varyasyonu {id}.jpg olarak kopyalamak için
            // (Node.js script olmadan yapılamaz, kullanıcıya bilgi ver)
            $("#setMainBtn").on("click", function () {
                const activeBtn = document.querySelector(".var-btn.active");
                if (!activeBtn || parseInt(activeBtn.dataset.v) === 0) return;
                const v = activeBtn.dataset.v;
                const id = AC.currentAgent.id;
                alert(`Ana görsel olarak kaydetmek için terminalde şunu çalıştır:\n\ncopy agent-cards\\images\\agents\\${id}-v${v}.jpg agent-cards\\images\\agents\\${id}.jpg`);
            });
        });
    </script>

</body>

</html>
